name: "backend versioning"
on:
  pull_request:
    branches: [main]
  
jobs:
  version_backend:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    uses: CorporalCiprian/todo-template/.github/workflows/versioning-template.yml@main
    with: 
      branch: ${{ github.event.pull_request.head.ref }}